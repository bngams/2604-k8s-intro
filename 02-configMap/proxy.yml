apiVersion: v1
kind: Pod
metadata:
  name: proxy
  namespace: whoami-configmap
  labels:
    app: proxy
spec:
  containers:
  - name: proxy
    image: nginx:latest
    resources:
      limits:
        memory: "128Mi"
        cpu: "500m"
      requests:
        memory: "64Mi"
        cpu: "250m"
    volumeMounts:
    - name: config
      mountPath: "/etc/nginx/"
    ports:
      - containerPort: 80
  volumes:
  - name: config
    configMap:
      name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: proxy
  namespace: whoami-configmap
  labels:
    app: proxy
spec:
  selector:
    app: proxy
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80