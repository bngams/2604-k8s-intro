apiVersion: v1
kind: Pod
metadata:
  name: poddy
  namespace: whoami-configmap
  labels:
    app: whoami
spec:
  containers:
  - name: whoami
    image: traefik/whoami
    ports:
    - containerPort: 80
    resources:
      limits:
        memory: "128Mi"
        cpu: "500m"
      requests:
        memory: "64Mi"
        cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: whoami
  namespace: whoami-configmap
  labels:
    app: whoami
spec:
  selector:
    app: whoami
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80