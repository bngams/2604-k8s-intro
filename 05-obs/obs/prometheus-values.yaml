# Prometheus — configuration allégée pour lab/dev

server:
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  retention: "7d"
  persistentVolume:
    enabled: true
    size: 8Gi

# Composants désactivés (non nécessaires pour le lab)
alertmanager:
  enabled: false

pushgateway:
  enabled: false

# Métriques Kubernetes — garder activés
kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true
